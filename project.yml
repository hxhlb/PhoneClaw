name: PhoneClaw
options:
  bundleIdPrefix: com.phoneclaw
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only

targets:
  PhoneClaw:
    type: application
    platform: iOS
    sources:
      - path: PhoneClaw
        excludes:
          - "*.h"
    settings:
      base:
        INFOPLIST_FILE: PhoneClaw/Info.plist
        CODE_SIGN_ENTITLEMENTS: PhoneClaw/PhoneClaw.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.zxw.phoneclaw2026
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: PhoneClaw/PhoneClaw-Bridging-Header.h
